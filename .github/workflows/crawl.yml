name: MFDS 크롤링 및 배포

on:
  # 수동 트리거 (GitHub 모바일 앱에서 실행 가능)
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 사유 (선택)'
        required: false
        default: '수동 크롤링'

  # 자동 스케줄: 매일 한국시간 오전 9시 (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 크롤링 실행
        env:
          GITHUB_ACTIONS_CRAWL: 'true'
        run: python croll_mfds.py

      - name: 변경사항 확인 및 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json crawl_log.txt

          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 스킵"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
            git commit -m "Update data.json (${TIMESTAMP})"
            git push
            echo "data.json 업데이트 완료 → Cloudflare Pages 배포 시작"
          fi
